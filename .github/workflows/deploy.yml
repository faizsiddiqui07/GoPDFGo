name: Deploy Next.js to Hostinger

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4 # Latest v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4 # Latest v4
        with:
          node-version: '20'
          cache: 'npm' # 🔥 ChatGPT's Pro Tip: Cache enabled!

      - name: 📦 Install dependencies
        run: npm ci # 🔥 ChatGPT's Pro Tip: Clean Install for speed!

      - name: 🏗️ Build Next.js app
        run: npm run build

      - name: 🚀 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Latest Patch
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./ # Jo humne 403 fix ke liye update kiya tha
          dangerous-clean-slate: true